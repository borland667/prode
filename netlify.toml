[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  # Function must not be named "api": it collides with the /api source directory
  # in the Lambda bundle (ERR_UNSUPPORTED_DIR_IMPORT on Node ESM).
  to = "/.netlify/functions/prode-http/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
