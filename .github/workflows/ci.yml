name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: prode
          POSTGRES_PASSWORD: prode123
          POSTGRES_DB: prode
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U prode -d prode"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://prode:prode123@127.0.0.1:5432/prode
      JWT_SECRET: ci-test-secret
      SITE_URL: http://localhost:5173

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify project
        run: npm run verify

  migrate-production:
    name: Deploy production migrations
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.PRODUCTION_DATABASE_URL != ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: production-migrations-main
      cancel-in-progress: false
    env:
      DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply production migrations
        run: npm run db:migrate:deploy
